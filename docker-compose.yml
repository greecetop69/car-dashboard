services:
  mysql:
    image: mysql:8.4
    container_name: car-dashboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: car_dashboard
      MYSQL_USER: car_user
      MYSQL_PASSWORD: car_password
      TZ: Europe/Chisinau
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
